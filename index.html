<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentDo | To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-shell">
        <header class="topbar">
            <a class="brand" href="index.html" aria-label="StudentDo home">StudentDo</a>
            <nav class="top-actions" aria-label="Main navigation">
                <span id="welcomeUser" class="user-pill" aria-live="polite"></span>
                <button id="themeToggle" class="ghost icon-btn" aria-label="Toggle theme">Theme</button>
                <button id="logoutBtn" class="ghost" aria-label="Log out">Logout</button>
            </nav>
        </header>

        <main class="container">
            <header class="hero">
                <div>
                    <p class="eyebrow">Productivity Workspace</p>
                    <h1>Plan with clarity. Execute with momentum.</h1>
                    <p class="tagline">Prioritize your tasks, track deadlines, and finish your day with confidence.</p>
                </div>
            </header>

            <div class="input-section">
                <input type="text" id="taskInput" placeholder="What do you need to do?" aria-label="Task description">
                <select id="prioritySelect" aria-label="Priority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
                <select id="timeSelect" aria-label="Deadline">
                    <option value="30">30 min</option>
                    <option value="60">1 hour</option>
                    <option value="360">6 hours</option>
                    <option value="720">12 hours</option>
                    <option value="1440" selected>24 hours</option>
                </select>
                <button id="addBtn">Add Task</button>
            </div>

            <div class="toolbar">
                <div class="filters" aria-label="Filters">
                    <button class="chip active" data-filter="all">All</button>
                    <button class="chip" data-filter="active">Active</button>
                    <button class="chip" data-filter="completed">Completed</button>
                    <button class="chip" data-filter="expired">Expired</button>
                </div>
                <input type="search" id="searchInput" placeholder="Search tasks" aria-label="Search tasks">
                <select id="sortSelect" aria-label="Sort tasks">
                    <option value="soon">Soonest first</option>
                    <option value="priority">Priority</option>
                    <option value="new">Newest</option>
                </select>
            </div>

            <div class="stats">
                <div>
                    <p id="counts" class="counts">0 tasks</p>
                    <div class="progress"><span id="progressBar"></span></div>
                </div>
                <div class="actions">
                    <button id="clearCompleted" class="ghost">Clear completed</button>
                    <button id="clearAll" class="ghost">Clear all</button>
                </div>
            </div>

            <ul id="taskList" aria-live="polite"></ul>
        </main>
    </div>

<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
