<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentDo | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <section class="auth-card" aria-labelledby="registerTitle">
        <p class="eyebrow">Get Started</p>
        <h1 id="registerTitle">Create your StudentDo account</h1>
        <p class="auth-subtext">Set up your account in under a minute and start organizing smarter.</p>

        <form id="registerForm" class="auth-form">
            <input type="text" id="name" placeholder="Full name" autocomplete="name" required>
            <input type="email" id="email" placeholder="Email address" autocomplete="email" required>
            <input type="password" id="password" placeholder="Password (min 8 chars)" autocomplete="new-password" required>
            <ul class="password-rules" id="passwordRules" aria-live="polite">
                <li id="rule-length" class="rule invalid"><span class="rule-icon" aria-hidden="true">✖</span> Minimum 8 characters</li>
                <li id="rule-number" class="rule invalid"><span class="rule-icon" aria-hidden="true">✖</span> At least one number</li>
                <li id="rule-special" class="rule invalid"><span class="rule-icon" aria-hidden="true">✖</span> At least one special character</li>
            </ul>
            <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required>
            <button type="submit">Register</button>
            <p id="registerMessage" class="form-message" aria-live="polite"></p>
        </form>

        <p class="auth-links">Already have an account? <a href="login.html">Login</a></p>
    </section>

    <script src="auth.js"></script>
</body>
</html>
